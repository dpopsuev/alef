name: alef-coding-agent
version: 1.0.0
description: >
  The default Alef coding agent blueprint.
  This manifest is the SBOM — the organ list is the canonical record
  of what ships. No code. Assembly is the runner's concern.

organs:
  - name: fs
    package: "@dpopsuev/alef-organ-fs"
  - name: shell
    package: "@dpopsuev/alef-organ-shell"
    blockedPatterns:
      - "--no-verify"
      - "--no-gpg-sign"
      - "git\\s+reset\\s+--hard"
      - "rm\\s+-rf\\s+/"
  - name: nodesh
    package: "@dpopsuev/alef-organ-nodesh"
  - name: web
    package: "@dpopsuev/alef-organ-web"
  - name: agent
    package: "@dpopsuev/alef-organ-agent"
  - name: factory
    package: "@dpopsuev/alef-organ-factory"
  - name: plan
    package: "@dpopsuev/alef-organ-plan"
  - name: discourse
    package: "@dpopsuev/alef-organ-discourse"
  - name: skills
    package: "@dpopsuev/alef-organ-skills"

capabilities:
  orchestration: true

memory:
  session: memory
