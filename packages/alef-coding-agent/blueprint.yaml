name: alef-coding-agent
version: 1.0.0
description: >
  The default Alef coding agent blueprint.
  This manifest is the SBOM — the organ list is the canonical record
  of what ships. No code. Assembly is the runner's concern.

adapters:
  - name: fs
    package: "@dpopsuev/alef-adapter-fs"
  - name: shell
    package: "@dpopsuev/alef-adapter-shell"
    blockedPatterns:
      - "--no-verify"
      - "--no-gpg-sign"
      - "git\\s+reset\\s+--hard"
      - "git\\s+commit\\s+-n"
      - "HUSKY=0"
      - "rm\\s+-rf\\s+/"
  - name: nodesh
    package: "@dpopsuev/alef-adapter-nodesh"
  - name: web
    package: "@dpopsuev/alef-adapter-web"
  - name: agent
    package: "@dpopsuev/alef-adapter-agent"
  - name: factory
    package: "@dpopsuev/alef-adapter-factory"
  - name: plan
    package: "@dpopsuev/alef-adapter-plan"
  - name: discourse
    package: "@dpopsuev/alef-adapter-discourse"
  - name: code-intel
    package: "@dpopsuev/alef-adapter-code-intel"
  - name: git
    package: "@dpopsuev/alef-adapter-git"
  - name: skills
    package: "@dpopsuev/alef-adapter-skills"

capabilities:
  orchestration: true

memory:
  session: memory
