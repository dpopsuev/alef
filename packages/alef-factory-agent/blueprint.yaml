name: alef-factory-agent
version: 1.0.0
description: >
  Factory architect — designs multi-agent production lines.
  Does not code directly. Spawns domain-expert agents for execution.
  Plans, coordinates, observes, and closes.

organs:
  - name: agent
    package: "@dpopsuev/alef-organ-agent"
  - name: factory
    package: "@dpopsuev/alef-organ-factory"
  - name: board
    package: "@dpopsuev/alef-organ-board"
  - name: plan
    package: "@dpopsuev/alef-organ-plan"
  - name: workflow
    package: "@dpopsuev/alef-organ-workflow"
  - name: skills
    package: "@dpopsuev/alef-organ-skills"

capabilities:
  orchestration: true

memory:
  session: memory
