name: alef-factory-agent
version: 1.0.0
description: >
  Factory architect — Factorio-style production line builder.
  Full coding capabilities + workflow orchestration + runtime prototyping.
  Builds automated pipelines of specialized agents connected by event bus
  contracts. Sandbox: create organs, blueprints, and workers at runtime.

organs:
  - name: fs
    package: "@dpopsuev/alef-organ-fs"
  - name: shell
    package: "@dpopsuev/alef-organ-shell"
    blockedPatterns:
      - "--no-verify"
      - "--no-gpg-sign"
      - "git\\s+reset\\s+--hard"
      - "rm\\s+-rf\\s+/"
  - name: nodesh
    package: "@dpopsuev/alef-organ-nodesh"
  - name: web
    package: "@dpopsuev/alef-organ-web"
  - name: agent
    package: "@dpopsuev/alef-organ-agent"
  - name: factory
    package: "@dpopsuev/alef-organ-factory"
  - name: workflow
    package: "@dpopsuev/alef-organ-workflow"
  - name: skills
    package: "@dpopsuev/alef-organ-skills"

capabilities:
  orchestration: true

memory:
  session: memory
