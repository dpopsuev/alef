name: alef-coding-agent
version: 1.0.0
description: >
  Canonical default agent SBOM — kept in sync with
  packages/profiles/coding/blueprint.yaml (singular owner).

adapters:
  - name: fs
    package: "@dpopsuev/alef-tool-fs"
  - name: shell
    package: "@dpopsuev/alef-tool-shell"
    blockedPatterns:
      - "--no-verify"
      - "--no-gpg-sign"
      - "git\\s+reset\\s+--hard"
      - "git\\s+commit\\s+-n"
      - "HUSKY=0"
      - "rm\\s+-rf\\s+/"
  - name: web
    package: "@dpopsuev/alef-tool-web"
  - name: code-intel
    package: "@dpopsuev/alef-tool-code-intel"
  - name: agent
    package: "@dpopsuev/alef-tool-agent"
  - name: skills
    package: "@dpopsuev/alef-tool-skills"
  - name: factory
    package: "@dpopsuev/alef-tool-factory"
  - name: plan
    package: "@dpopsuev/alef-tool-plan"
  - name: forge
    package: "@dpopsuev/alef-tool-forge"
  - name: git
    package: "@dpopsuev/alef-tool-git"
  - name: discourse
    package: "@dpopsuev/alef-tool-discourse"

capabilities:
  orchestration: true

memory:
  session: memory
