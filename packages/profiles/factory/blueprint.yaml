name: alef-factory-agent
version: 1.0.0
description: >
  Factory architect — designs multi-agent production lines.
  Does not code directly. Spawns domain-expert agents for execution.
  Plans, coordinates, observes, and closes.

  workflow/wire is assembly (injected by the stack factory), not an SBOM adapter.

adapters:
  - name: agent
    package: "@dpopsuev/alef-tool-agent"
  - name: factory
    package: "@dpopsuev/alef-tool-factory"
  - name: plan
    package: "@dpopsuev/alef-tool-plan"
  - name: skills
    package: "@dpopsuev/alef-tool-skills"

capabilities:
  orchestration: true

memory:
  session: memory
