name: alef-factory-agent
version: 1.0.0
description: >
  Coordinator for the Alef→Alef local factory line.
  Opens Plans, hands off custody, wakes Director/Supervisor/Workers via agent.run.
  Does not code directly — Workers use the coding SBOM.

  workflow/wire is assembly (injected by the stack factory), not an SBOM adapter.

adapters:
  - name: agent
    package: "@dpopsuev/alef-tool-agent"
  - name: factory
    package: "@dpopsuev/alef-tool-factory"
  - name: plan
    package: "@dpopsuev/alef-tool-plan"
  - name: forge
    package: "@dpopsuev/alef-tool-forge"
  - name: discourse
    package: "@dpopsuev/alef-tool-discourse"
  - name: skills
    package: "@dpopsuev/alef-tool-skills"

capabilities:
  orchestration: true

memory:
  session: memory
