name: alef-research-agent
version: 0.0.1
description: >
  Research agent: coding tools + Locus architecture analysis + Scribe knowledge base.
  Same adapters as the coding agent, with fleet services added at runtime.

adapters:
  - name: fs
    package: "@dpopsuev/alef-tool-fs"
  - name: shell
    package: "@dpopsuev/alef-tool-shell"
  - name: web
    package: "@dpopsuev/alef-tool-web"
  - name: agent
    package: "@dpopsuev/alef-tool-agent"
  - name: skills
    package: "@dpopsuev/alef-tool-skills"
  - name: discourse
    package: "@dpopsuev/alef-tool-discourse"

capabilities:
  orchestration: true

memory:
  session: memory
