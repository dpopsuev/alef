name: alef-research-agent
version: 0.0.1
description: >
  Research agent: coding tools + Locus architecture analysis + Scribe knowledge base.
  Same adapters as the coding agent, with fleet services added at runtime.

adapters:
  - name: fs
    package: "@dpopsuev/alef-adapter-fs"
  - name: shell
    package: "@dpopsuev/alef-adapter-shell"
  - name: nodesh
    package: "@dpopsuev/alef-adapter-nodesh"
  - name: code-intel
    package: "@dpopsuev/alef-adapter-code-intel"
  - name: web
    package: "@dpopsuev/alef-adapter-web"
  - name: agent
    package: "@dpopsuev/alef-adapter-agent"
  - name: factory
    package: "@dpopsuev/alef-adapter-factory"
  - name: skills
    package: "@dpopsuev/alef-adapter-skills"

capabilities:
  orchestration: true

memory:
  session: memory
